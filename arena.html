<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Document</title>
		<link rel="stylesheet" href="./css/nav.css" />
		<link rel="stylesheet" href="./css/main.css" />
		<link rel="stylesheet" href="./css/arena.css" />
	</head>
	<body>
		<header class="search-bar">
			<img src="assets/Logo.svg" alt="" />
			<nav class="search-bar">
				<div class="navTablet">
					<a href="explore.html"
						><img src="assets/nav-explore.svg" alt="Explore"
					/></a>
					<a href="Arena.html"
						><img src="assets/nav-Arena.svg" alt="Arena"
					/></a>
					<a href="rules.html"
						><img src="assets/nav-rules.svg" alt="Rules"
					/></a>
				</div>
				<div class="search-logo">
					<svg
						width="18"
						height="18"
						viewBox="0 0 18 18"
						fill="none"
						xmlns="http://www.w3.org/2000/svg"
					>
						<path
							d="M6.5 0C8.22391 0 9.87721 0.684819 11.0962 1.90381C12.3152 3.12279 13 4.77609 13 6.5C13 8.11 12.41 9.59 11.44 10.73L11.71 11H12.5L17.5 16L16 17.5L11 12.5V11.71L10.73 11.44C9.59 12.41 8.11 13 6.5 13C4.77609 13 3.12279 12.3152 1.90381 11.0962C0.684819 9.87721 0 8.22391 0 6.5C0 4.77609 0.684819 3.12279 1.90381 1.90381C3.12279 0.684819 4.77609 0 6.5 0ZM6.5 2C4 2 2 4 2 6.5C2 9 4 11 6.5 11C9 11 11 9 11 6.5C11 4 9 2 6.5 2Z"
							fill="#262626"
						/>
					</svg>
					<input class="search" type="text" placeholder="Search..." />
				</div>
			</nav>
			<button class="menu" id="openbtn">
				<img class="menu" src="assets/menubrg.svg" alt="" />
			</button>
			<dialog class="dial" id="dial">
				<button id="closebtn">
					<img src="assets/close-dial.svg" alt="" />
				</button>
				<div class="dial-nav">
					<a href="explore.html"
						><img src="assets/nav-explore.svg" alt="Explore"
					/></a>
					<a href="Arena.html"
						><img src="assets/nav-Arena.svg" alt="Arena"
					/></a>
					<a href="rules.html"
						><img src="assets/nav-rules.svg" alt="Rules"
					/></a>
				</div>
			</dialog>
			<img class="lunar" src="assets/lunar.svg" alt="" />
		</header>
		<div class="sky"></div>
		<div class="background-dirt"></div>
		<main>
			<section class="arena">
				<div class="row-part rules-box">
					<h1>Arena</h1>
					<div class="open-arena"><p id="text-change-arena">OPEN</p></div>
				</div>
				<p>Choose an entity to spawn inside the <span>Arena.</span></p>
				<form action="">
					<div class="xyz-group">
						<label for="">
							Entity
							<select name="" class="" id="">
								<option value="">chose</option>
							</select>
						</label>
						<label for="">
							X Coordinate
							<input placeholder="255.2" type="text" />
						</label>
						<label for="">
							Z Coordinate
							<input placeholder="126.7" type="text" />
						</label>
					</div>
					<button type="submit" class="btn-memanent">SPAWN</button>
				</form>
				<h2>Arena entities</h2>
				<hr />
				<p>
					This list describe all entities registered inside the
					<span>Arena. </span>
				</p>
				<table>
					<thead>
						<td>
							<span class="mobile-sp">Ent..</span>
							<span class="tablet-desktop-sp">Entity</span>
						</td>
						<td>
							<span class="mobile-sp">Na..</span
							><span class="tablet-desktop-sp">Name</span>
						</td>
						<td>
							<span class="mobile-sp">X</span
							><span class="tablet-desktop-sp">X Coordinate</span>
						</td>
						<td>
							<span class="mobile-sp">Y</span
							><span class="tablet-desktop-sp">Y Coordinate</span>
						</td>
						<td>
							<span class="mobile-sp">Stre..</span
							><span class="tablet-desktop-sp">Strength</span>
						</td>
						<td>
							<span class="mobile-sp">del</span
							><span class="tablet-desktop-sp">del</span>
						</td>
					</thead>
					<tbody></tbody>
				</table>
				<h2>Arena map</h2>
				<hr />
				<div class="map">
					<div class="boss-img">
						<img src="./assets/boss-Vector.svg" alt="" />
					</div>
				</div>
			</section>
		</main>
		<script src="./js/menu.js"></script>
		<script src="./arena.js"></script>
	</body>
</html>
